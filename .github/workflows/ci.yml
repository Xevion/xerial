name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  # One status check per concern for clear failure isolation. `panda codegen`
  # + `svelte-kit sync` run via the `prepare` script during `bun install`.
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: format, cmd: "bunx prettier --check ." }
          - { name: lint, cmd: "bunx eslint ." }
          - { name: typecheck, cmd: "bun run check:types" }
          - { name: knip, cmd: "bunx knip" }
          - { name: spell, cmd: 'bunx cspell --no-progress --gitignore "**/*.{ts,js,svelte,md}"' }
          - { name: test, cmd: "bun test" }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: ${{ matrix.cmd }}

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bun run build

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - run: bun install --frozen-lockfile
      - run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
