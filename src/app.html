<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="32x32" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta name="theme-color" content="#1c6740" />
		<meta
			name="description"
			content="Xerial expands Primavera P6 XER calendars into a day-by-day Excel grid, entirely in your browser."
		/>
		<script>
			// Resolve the theme before first paint so the page never flashes light
			// then dark. Mirrors src/lib/theme.svelte.ts: a `dark` class on <html>
			// activates the Panda `_dark` token values.
			(function () {
				try {
					var stored = localStorage.getItem("xerial:theme");
					var dark =
						stored === "dark" || (!stored && matchMedia("(prefers-color-scheme: dark)").matches);
					if (dark) document.documentElement.classList.add("dark");
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
