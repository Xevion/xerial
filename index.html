<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xerial · Primavera P6 calendars to Excel</title>
    <meta
      name="description"
      content="Xerial expands Primavera P6 XER calendars into a day-by-day Excel grid, entirely in your browser."
    />
  </head>
  <body>
    <script>
      // Resolve the theme before first paint so the page never flashes light
      // then dark. Mirrors src/app/theme.svelte.ts: a `dark` class on <html>
      // activates the Panda `_dark` token values.
      (function () {
        try {
          var stored = localStorage.getItem("xerial:theme");
          var dark =
            stored === "dark" ||
            (!stored && matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
