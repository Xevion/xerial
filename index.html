<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xerial · Primavera P6 calendars to Excel</title>
    <meta
      name="description"
      content="Xerial expands Primavera P6 XER calendars into a day-by-day Excel grid, entirely in your browser."
    />
  </head>
  <body>
    <script>
      // Resolve the theme before first paint so the page never flashes light
      // then dark. Mirrors src/app/theme.ts (key + system-preference fallback).
      (function () {
        try {
          var t = localStorage.getItem("xerial:theme");
          if (t !== "light" && t !== "dark")
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
